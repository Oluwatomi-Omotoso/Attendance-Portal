name: Attendance Check-in Backup

on:
  schedule:
    - cron: "0 11 * * *" # 12:00 PM WAT (UTC+1) — GitHub Actions schedules run in UTC
  workflow_dispatch: {} # lets you also trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Download today's check-ins
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python attendance_backup.py --type checkin

      - name: Commit backup to repo
        run: |
          git config user.name "attendance-bot"
          git config user.email "attendance-bot@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "Backup: check-ins $(date +'%Y-%m-%d')"
          git push
