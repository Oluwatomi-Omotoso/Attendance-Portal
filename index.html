<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase (QR/camera libraries removed — no longer needed) -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="./styles.css" />

    <title>NUPRC Interns/Corpers Attendance Portal</title>
  </head>

  <body>
    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-50">
      <div
        class="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 sm:gap-0"
      >
        <div class="flex items-center gap-2 sm:gap-3">
          <div
            class="w-8 h-8 sm:w-9 sm:h-9 bg-blue-600 rounded-xl sm:rounded-2xl flex items-center justify-center text-white font-bold text-xl sm:text-2xl shrink-0"
          ></div>
          <h1 class="text-lg sm:text-2xl font-bold text-gray-900">
            Interns/Corpers Attendance Portal
          </h1>
        </div>
        <nav
          class="flex justify-between sm:justify-end gap-4 sm:gap-8 text-sm sm:text-lg"
        >
          <button onclick="switchTab(0)" class="tab-active pb-1" id="tab0">
            Welcome
          </button>
          <button
            onclick="switchTab(1)"
            class="pb-1 hover:text-blue-600"
            id="tab1"
          >
            Register
          </button>
          <button
            onclick="switchTab(2)"
            class="pb-1 hover:text-blue-600"
            id="tab2"
          >
            Quick Check-in
          </button>
        </nav>
      </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-12">
      <!-- Welcome Screen -->
      <div id="screen0" class="tab-screen">
        <div class="text-center py-6 sm:py-20">
          <div class="phone-frame bg-white mx-auto">
            <div
              class="bg-gradient-to-br from-blue-600 to-blue-700 text-white p-6 sm:p-10 text-center"
            >
              <h2 class="text-2xl sm:text-4xl font-bold mb-4">
                Let's get you signed up.
              </h2>
            </div>
            <div class="p-6 sm:p-10 text-center">
              <div class="space-y-5 sm:space-y-6">
                <i class="fas fa-users text-5xl sm:text-6xl text-blue-100"></i>
                <p class="text-gray-600 text-base sm:text-lg">
                  Fill in your details once, and simply check in from this
                  device every other time.
                </p>
                <button
                  onclick="switchTab(1)"
                  class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition"
                >
                  Get Started
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Registration Form -->
      <div id="screen1" class="tab-screen hidden">
        <div
          class="max-w-md mx-auto bg-white rounded-2xl sm:rounded-3xl shadow-xl p-5 sm:p-8"
        >
          <h2 class="text-2xl sm:text-3xl font-bold text-center mb-6 sm:mb-8">
            Create Your Profile
          </h2>

          <form id="registrationForm" class="space-y-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Full Name</label
              >
              <input
                name="fullName"
                id="fullName"
                type="text"
                required
                class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                placeholder="Mo. Salah"
              />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Phone Number</label
              >
              <input
                name="phone"
                id="phone"
                type="tel"
                class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                placeholder="+234 801 234 5678"
              />
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Unit</label
              >
              <select
                name="unit"
                id="unit"
                class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
              >
                <option>App development</option>
                <option>Data-Management</option>
                <option>GRC</option>
                <option>Infrastructure</option>
                <option>Networking</option>
                <option>Agile</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Role / Position</label
              >
              <input
                name="role"
                id="role"
                type="text"
                class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                placeholder="Corper"
              />
            </div>

            <button
              type="button"
              id="registerBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-lg transition mt-8"
            >
              Register
            </button>
          </form>
          <div id="qrResult" class="hidden"></div>
        </div>
      </div>

      <!-- Quick Check-in -->
      <div id="screen2" class="tab-screen hidden">
        <div
          class="max-w-md mx-auto bg-white rounded-2xl sm:rounded-3xl shadow-xl p-5 sm:p-8 text-center"
        >
          <h2 class="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">
            Quick Check-In
          </h2>

          <!-- Populated by renderCheckinBox() based on what's saved in localStorage -->
          <div id="checkinDeviceBox"></div>

          <p id="checkinMessage" class="mt-4 font-medium"></p>

          <div class="mt-12">
            <h3 class="text-left font-medium text-gray-600 mb-4">
              Recent Activity
            </h3>
            <div id="recentActivityList" class="space-y-3 text-left">
              <p class="text-gray-400 text-sm">Loading...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./supabase-client.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
