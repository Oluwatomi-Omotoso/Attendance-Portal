<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: { DEFAULT: "#0b1420", panel: "#131f30" },
              paper: "#f8f5ee",
              brass: { DEFAULT: "#d89b3c", dark: "#b57f2c" },
              signal: "#2f9e6e",
              rust: "#c1522a",
              ink: "#16202b",
            },
            fontFamily: {
              display: ['"Space Grotesk"', "sans-serif"],
              mono: ['"IBM Plex Mono"', "monospace"],
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="./styles.css" />

    <title>ICT Check-In Portal</title>
  </head>

  <body class="min-h-screen">
    <!-- Header: control-bar styling -->
    <header
      class="bg-navy text-paper sticky top-0 z-50 border-b-2 border-brass"
    >
      <div
        class="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 sm:gap-0"
      >
        <div class="flex items-center gap-2 sm:gap-3">
          <div>
            <h1
              class="font-display text-base sm:text-xl font-bold leading-tight"
            >
              ICT Check-In Portal
            </h1>
            <div
              class="hidden sm:flex items-center gap-1.5 font-mono text-[10px] uppercase tracking-widest text-paper/50"
            >
              <span class="status-light on"></span> System Online
            </div>
          </div>
        </div>

        <nav
          class="flex gap-1 bg-navy-panel rounded-full p-1 text-xs sm:text-sm"
        >
          <button
            onclick="switchTab(0)"
            class="tab-active px-3 sm:px-4 py-1.5 rounded-full transition font-medium"
            id="tab0"
          >
            Welcome
          </button>
          <button
            onclick="switchTab(1)"
            class="px-3 sm:px-4 py-1.5 rounded-full transition font-medium text-paper/60 hover:text-paper"
            id="tab1"
          >
            Register
          </button>
          <button
            onclick="switchTab(2)"
            class="px-3 sm:px-4 py-1.5 rounded-full transition font-medium text-paper/60 hover:text-paper"
            id="tab2"
          >
            Quick Check-in
          </button>
        </nav>
      </div>
    </header>

    <!-- Page contents -->
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-12">
      <!-- Welcome Screen -->
      <div id="screen0" class="tab-screen">
        <div class="max-w-lg mx-auto">
          <div class="panel-card p-6 sm:p-10">
            <div
              class="flex items-center gap-2 font-mono text-xs uppercase tracking-widest text-brass-dark mb-4"
            >
              <span class="status-light ready"></span> Daily Sign-In
            </div>
            <h2
              class="font-display text-3xl sm:text-4xl font-bold text-ink mb-4 leading-tight"
            >
              Register once.<br />Check in every day.
            </h2>
            <p class="text-ink/70 text-base sm:text-lg mb-8">
              Fill in your details once on this device. After that, checking in
              takes one tap.
            </p>
            <button
              onclick="switchTab(1)"
              class="btn-press w-full bg-brass hover:bg-brass-dark text-navy font-display font-semibold uppercase tracking-wide py-4 rounded-lg text-base transition"
            >
              Get Started
            </button>
          </div>
        </div>
      </div>

      <!-- Registration Form -->
      <div id="screen1" class="tab-screen hidden">
        <div class="max-w-md mx-auto panel-card p-5 sm:p-8">
          <div
            class="font-mono text-xs uppercase tracking-widest text-brass-dark mb-2"
          >
            Personnel Registration
          </div>
          <h2
            class="font-display text-2xl sm:text-3xl font-bold text-ink mb-6 sm:mb-8"
          >
            Create Your Profile
          </h2>

          <form id="registrationForm" class="space-y-5">
            <div>
              <label
                class="block font-mono text-xs uppercase tracking-wide text-ink/60 mb-1.5"
                >Full Name</label
              >
              <input
                name="fullName"
                id="fullName"
                type="text"
                required
                class="w-full px-4 py-3 border border-ink/15 bg-white/70 rounded-lg focus:outline-none focus:border-brass transition-colors"
                placeholder="Mo. Salah"
              />
            </div>
            <div>
              <label
                class="block font-mono text-xs uppercase tracking-wide text-ink/60 mb-1.5"
                >Phone Number</label
              >
              <input
                name="phone"
                id="phone"
                type="tel"
                class="w-full px-4 py-3 border border-ink/15 bg-white/70 rounded-lg focus:outline-none focus:border-brass transition-colors"
                placeholder="+234 801 234 5678"
              />
            </div>

            <div>
              <label
                class="block font-mono text-xs uppercase tracking-wide text-ink/60 mb-1.5"
                >Unit</label
              >
              <select
                name="unit"
                id="unit"
                class="w-full px-4 py-3 border border-ink/15 bg-white/70 rounded-lg focus:outline-none focus:border-brass transition-colors"
              >
                <option>App development</option>
                <option>Data-Management</option>
                <option>GRC</option>
                <option>Infrastructure</option>
                <option>Networking</option>
                <option>Agile</option>
              </select>
            </div>

            <div>
              <label
                class="block font-mono text-xs uppercase tracking-wide text-ink/60 mb-1.5"
                >Role / Position</label
              >
              <input
                name="role"
                id="role"
                type="text"
                class="w-full px-4 py-3 border border-ink/15 bg-white/70 rounded-lg focus:outline-none focus:border-brass transition-colors"
                placeholder="Corper"
              />
            </div>

            <button
              type="button"
              id="registerBtn"
              class="btn-press w-full bg-brass hover:bg-brass-dark text-navy font-display font-semibold uppercase tracking-wide py-4 rounded-lg text-base transition mt-6"
            >
              Register
            </button>
          </form>

          <div id="qrResult" class="hidden"></div>
        </div>
      </div>

      <!-- Quick Check-in -->
      <div id="screen2" class="tab-screen hidden">
        <div class="max-w-md mx-auto panel-card p-5 sm:p-8 text-center">
          <div
            class="font-mono text-xs uppercase tracking-widest text-brass-dark mb-2"
          >
            Attendance Log
          </div>
          <h2
            class="font-display text-2xl sm:text-3xl font-bold text-ink mb-6 sm:mb-8"
          >
            Quick Check-In
          </h2>

          <!-- Populated by renderCheckinBox() based on what's saved in localStorage -->
          <div id="checkinDeviceBox"></div>

          <p id="checkinMessage" class="mt-4 font-mono text-sm"></p>

          <div class="mt-12 text-left">
            <h3
              class="font-mono text-xs uppercase tracking-widest text-ink/50 mb-4"
            >
              Recent Activity
            </h3>
            <div id="recentActivityList" class="space-y-3">
              <p class="text-ink/40 text-sm font-mono">Loading...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./supabase-client.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
